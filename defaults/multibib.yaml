pdf-engine: lualatex

resource-path: 
  - .
  - figuras
  - ${USERDATA}

filters:
  - include-files.lua
  - pandoc-crossref
  - noindent.lua
  - multibib.lua
  - correcciones-notas.lua

template: memoir.tex
top-level-division: chapter

metadata:
  lang: es-ES
  figureTitle: "FIGURA"
  tableTitle: "TABLA"
  figPrefix:
    - "fig."
    - "figs."
  tblPrefix:
    - "tabla"
    - "tablas"
  eqnPrefix:
    - "ec."
    - "ecs."
  lofTitle: "Lista de figuras"
  lotTitle: "Lista de tablas"
